<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Bunny ears -->
  <ellipse cx="9" cy="5" rx="2" ry="4" />
  <ellipse cx="15" cy="5" rx="2" ry="4" />
  <!-- Inner ear lines -->
  <line x1="9" y1="3" x2="9" y2="7" opacity="0.5"/>
  <line x1="15" y1="3" x2="15" y2="7" opacity="0.5"/>
  <!-- Bunny face -->
  <ellipse cx="12" cy="14" rx="6" ry="5" />
  <!-- Eyes -->
  <circle cx="10" cy="13" r="0.8" fill="currentColor" stroke="none"/>
  <circle cx="14" cy="13" r="0.8" fill="currentColor" stroke="none"/>
  <!-- Nose -->
  <ellipse cx="12" cy="15" rx="0.8" ry="0.5" fill="currentColor" stroke="none"/>
  <!-- Mouth -->
  <path d="M11 16.5 Q12 17.5 13 16.5" fill="none"/>
  <!-- Whiskers -->
  <line x1="7" y1="15" x2="5" y2="14.5" opacity="0.6"/>
  <line x1="7" y1="16" x2="5" y2="16" opacity="0.6"/>
  <line x1="17" y1="15" x2="19" y2="14.5" opacity="0.6"/>
  <line x1="17" y1="16" x2="19" y2="16" opacity="0.6"/>
</svg>